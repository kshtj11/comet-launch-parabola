<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>540x620 Webpage</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="container">
        <!-- Cover Background -->
        <img id="cover-bg" src="bgs/Frame 2609175.png" alt="">

        <!-- Full Homescreen -->
        <img id="full-homescreen" src="Frame 61.png" alt="">

        <!-- The white flash that appears at the end -->
        <div class="white-flash" id="white-flash"></div>

        <!-- Status Bar -->
        <div class="status-bar"></div>
        <div class="time-top">12:30</div>
        
        <!-- Toggle Button Removed -->
        <!-- Network & Battery Icons -->
        <div class="wifi-1"></div>
        <div class="wifi-2"></div>
        <div class="wifi-3"></div>
        <div class="battery-body"></div>
        <div class="battery-fill"></div>
        <div class="battery-tip"></div>
        
        <!-- Bottom Section -->
        <div class="swipe-text" id="swipe-text">Swipe up to launch</div>
        
        <!-- The tail of the comet -->
        <svg id="tail-svg" width="540" height="620" style="position: absolute; top: 0; left: 0; z-index: 4; pointer-events: none; opacity: 0;">
            <defs>
                <mask id="homescreen-mask">
                    <path id="tail-path-mask" fill="white" d="" />
                </mask>
                <filter id="colored-glow" x="-50%" y="-50%" width="200%" height="200%">
                    <feOffset dx="0" dy="3" in="SourceGraphic" result="offset" />
                    <feGaussianBlur stdDeviation="8" in="offset" result="blur" />
                </filter>
            </defs>
            
            <!-- Solid Homescreen Window -->
            <image id="homescreen-bg" href="Frame%2061.png" x="0" y="0" width="540" height="620" preserveAspectRatio="xMidYMid slice" mask="url(#homescreen-mask)" style="display: block;" />
            
            <!-- Glowing Trail Border -->
            <path id="tail-path-glow" fill="none" stroke="rgba(67, 56, 202, 0.95)" stroke-width="12" filter="url(#colored-glow)" mask="url(#homescreen-mask)" style="mix-blend-mode: multiply;" d="" />
        </svg>
        
        <!-- Button Component (Comet) -->
        <div class="component-1" id="comet">
            <div class="layer-a"></div>
            <div class="layer-b"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
