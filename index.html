<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>540x620 Webpage</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="container">
        <!-- Cover Background -->
        <img id="cover-bg" src="bgs/Frame 2609175.png" alt="">

        <!-- The white flash that appears at the end -->
        <div class="white-flash" id="white-flash"></div>

        <!-- Status Bar -->
        <div class="status-bar"></div>
        <div class="time-top">12:30</div>
        
        <!-- Toggle Button -->
        <div style="position: absolute; top: 44px; left: 20px; z-index: 100;">
            <button id="variant-toggle" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; backdrop-filter: blur(4px);">Variant 3</button>
        </div>
        
        <!-- Network & Battery Icons -->
        <div class="wifi-1"></div>
        <div class="wifi-2"></div>
        <div class="wifi-3"></div>
        <div class="battery-body"></div>
        <div class="battery-fill"></div>
        <div class="battery-tip"></div>
        
        <!-- Bottom Section -->
        <div class="swipe-text" id="swipe-text">Swipe up to launch</div>
        
        <!-- The tail of the comet -->
        <svg id="tail-svg" width="540" height="620" style="position: absolute; top: 0; left: 0; z-index: 4; pointer-events: none; opacity: 0;">
            <defs>
                <!-- Base white/grey (Variant 1) -->
                <linearGradient id="tail-grad-base" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0.3)" id="tail-stop-top" />
                    <stop offset="100%" stop-color="rgba(217,217,217,0)" id="tail-stop-bottom" />
                </linearGradient>
                
                <!-- Variant 2 Orange Layer -->
                <linearGradient id="tail-grad-orange" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="1.55%" stop-color="rgba(255, 118, 0, 0.88)" />
                    <stop offset="20.2%" stop-color="rgba(252, 161, 74, 0.3344)" />
                    <stop offset="46.5%" stop-color="rgba(106, 108, 198, 0)" />
                </linearGradient>
                
                <!-- Variant 2 Blue Layer -->
                <linearGradient id="tail-grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="14.09%" stop-color="rgba(101, 181, 255, 0.71)" />
                    <stop offset="92.53%" stop-color="rgba(102, 102, 102, 0)" />
                </linearGradient>
                
                <!-- Variant 3 Mask Gradient (Inverted: transparent top, solid white bottom) -->
                <linearGradient id="tail-grad-mask" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="rgba(255,255,255,0)" />
                    <stop offset="100%" stop-color="rgba(255,255,255,1)" />
                </linearGradient>
                
                <mask id="homescreen-mask">
                    <path id="tail-path-mask" fill="url(#tail-grad-mask)" d="" />
                </mask>
            </defs>
            
            <!-- Variant 3 Homescreen -->
            <image id="homescreen-bg" href="Frame%2061.png" x="0" y="0" width="540" height="620" preserveAspectRatio="xMidYMid slice" mask="url(#homescreen-mask)" style="display: block;" />
            
            <path id="tail-path" fill="url(#tail-grad-base)" d="" style="display: none;" />
            
            <g id="variant-2-overlays" style="opacity: 0.8; display: none;">
                <path id="tail-path-orange" fill="none" stroke="url(#tail-grad-orange)" stroke-width="6" d="" />
                <path id="tail-path-blue" fill="none" stroke="url(#tail-grad-blue)" stroke-width="6" style="mix-blend-mode: color-burn;" d="" />
            </g>
        </svg>
        
        <!-- Button Component (Comet) -->
        <div class="component-1" id="comet">
            <div class="layer-a"></div>
            <div class="layer-b"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
